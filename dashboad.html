<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Student Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <h1>Welcome to Your Portal! 🎓</h1>
        
        <div class="card-container">
            <div class="card">
                <h3>Attendance</h3>
                <p class="big-text">92%</p>
            </div>
            <div class="card">
                <h3>Latest Marks</h3>
                <p class="big-text">A+</p>
            </div>
            <div class="card">
                <h3>Upcoming Holidays</h3>
                <p>Summer Break: June 1st</p>
            </div>
            <div class="card">
                <h3>Assignments</h3>
                <p>Math Quiz - Due Tomorrow</p>
            </div>
        </div>

        <button class="logout" onclick="location.href='index.html'">Logout</button>
    </div>
</body>
</html>
